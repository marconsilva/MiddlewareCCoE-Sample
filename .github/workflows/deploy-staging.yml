name: Deploy Staging

on:
  workflow_dispatch:
    inputs:
      deployment_id:
        description: Deployment tracking issue, PR, or external identifier
        required: true
        type: string
      commit_sha:
        description: Commit SHA to promote into staging
        required: true
        type: string
  workflow_run:
    workflows:
      - Deploy DEV
    types:
      - completed

permissions:
  contents: read
  id-token: write
  deployments: write
  actions: read
  issues: write
  pull-requests: write

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve deployment metadata
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push') }}
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.resolve.outputs.commit_sha }}
      deployment_id: ${{ steps.resolve.outputs.deployment_id }}
      source_run_id: ${{ steps.resolve.outputs.source_run_id }}
    steps:
      - name: Resolve metadata
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "commit_sha=${{ inputs.commit_sha }}" >> "$GITHUB_OUTPUT"
            echo "deployment_id=${{ inputs.deployment_id }}" >> "$GITHUB_OUTPUT"
            echo "source_run_id=manual-dispatch" >> "$GITHUB_OUTPUT"
          else
            echo "commit_sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
            echo "deployment_id=staging-${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "source_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy to Staging
    needs: prepare
    runs-on: ubuntu-latest
    # Approval is enforced by the GitHub environment configuration for `staging`.
    environment:
      name: staging
    env:
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_STAGING }}
      AZURE_RESOURCE_GROUP: rg-middleware-staging
      AKS_CLUSTER_NAME: aks-middleware-staging
      BICEP_DIRECTORY: infrastructure/environments/staging
      TRACKING_ID: ${{ needs.prepare.outputs.deployment_id }}
      DEPLOY_REF: ${{ needs.prepare.outputs.commit_sha }}
    steps:
      - name: Checkout code at promoted commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.commit_sha }}

      - name: Create deployment record
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: process.env.DEPLOY_REF,
              environment: 'staging',
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: false,
              description: `Staging deployment for ${process.env.DEPLOY_REF}`,
              payload: JSON.stringify({
                tracking_id: process.env.TRACKING_ID,
                source_run_id: '${{ needs.prepare.outputs.source_run_id }}'
              })
            });
            core.setOutput('deployment_record_id', deployment.data.id.toString());

      - name: Mark deployment in progress
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_record_id }}'),
              state: 'in_progress',
              log_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              description: 'Waiting for staging approval and deployment execution'
            });

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep templates for staging
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            az account set --subscription "$AZURE_SUBSCRIPTION_ID"
            if [ -d "$BICEP_DIRECTORY" ]; then
              TEMPLATE_FILE=$(find "$BICEP_DIRECTORY" -maxdepth 1 -name "*.bicep" | head -n 1)
              PARAMETERS_FILE="$BICEP_DIRECTORY/parameters.json"
              if [ -n "$TEMPLATE_FILE" ]; then
                DEPLOY_ARGS=(deployment group create --resource-group "$AZURE_RESOURCE_GROUP" --template-file "$TEMPLATE_FILE")
                if [ -f "$PARAMETERS_FILE" ]; then
                  DEPLOY_ARGS+=(--parameters @"$PARAMETERS_FILE")
                fi
                az "${DEPLOY_ARGS[@]}"
              else
                echo "No Bicep template found under $BICEP_DIRECTORY."
              fi
            else
              echo "Expected directory $BICEP_DIRECTORY was not found in this sample repository."
            fi

      - name: Apply Kubernetes manifests to staging cluster
        run: |
          echo "Simulating kubectl apply for $AKS_CLUSTER_NAME"
          echo "# Example: kubectl apply -k infrastructure/environments/staging/k8s"
          echo "Staging manifests applied."

      - name: Run integration tests
        run: |
          echo "Running simulated integration tests against STAGING..."
          sleep 10
          echo "Integration tests passed."

      - name: Post deployment status to original issue or PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const trackingId = process.env.TRACKING_ID;
            if (!/^\d+$/.test(trackingId)) {
              core.info(`Tracking id ${trackingId} is not a numeric issue or PR reference; skipping comment.`);
              return;
            }
            try {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: Number(trackingId),
                body: `Staging deployment for \`${process.env.DEPLOY_REF}\` finished with status: **${{ job.status }}**.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              });
            } catch (error) {
              core.warning(`Unable to comment on issue/PR ${trackingId}: ${error.message}`);
            }

      - name: Mark deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_record_id }}'),
              state: 'success',
              log_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              environment_url: 'https://staging.example.internal',
              description: 'Staging deployment completed successfully'
            });

      - name: Mark deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_record_id }}'),
              state: 'failure',
              log_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              description: 'Staging deployment failed'
            });

      - name: Notify production promotion availability
        if: success()
        run: |
          echo "Production promotion is now available for commit $DEPLOY_REF." >> "$GITHUB_STEP_SUMMARY"
          echo "Use deploy-production.yml with staging_run_id=${{ github.run_id }} to continue." >> "$GITHUB_STEP_SUMMARY"
