name: Deploy DEV

on:
  push:
    branches:
      - main
    paths:
      - infrastructure/**
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  deployments: write
  actions: write
  issues: write
  pull-requests: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to DEV
    runs-on: ubuntu-latest
    environment:
      name: dev
    env:
      AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_DEV }}
      AZURE_RESOURCE_GROUP: rg-middleware-dev
      AKS_CLUSTER_NAME: aks-middleware-dev
      BICEP_DIRECTORY: infrastructure/environments/dev
      TRACKING_ID: dev-${{ github.run_id }}
      DEPLOY_REF: ${{ github.sha }}
    outputs:
      tracking_id: ${{ steps.metadata.outputs.tracking_id }}
      deployment_record_id: ${{ steps.create_deployment.outputs.deployment_record_id }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve deployment metadata
        id: metadata
        run: |
          echo "tracking_id=${TRACKING_ID}" >> "$GITHUB_OUTPUT"
          echo "deploy_ref=${DEPLOY_REF}" >> "$GITHUB_OUTPUT"

      - name: Create deployment record
        id: create_deployment
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const deployment = await github.rest.repos.createDeployment({
              owner,
              repo,
              ref: process.env.DEPLOY_REF,
              environment: 'dev',
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: false,
              description: `DEV deployment for ${process.env.DEPLOY_REF}`,
              payload: JSON.stringify({
                tracking_id: process.env.TRACKING_ID,
                source_event: context.eventName
              })
            });
            core.setOutput('deployment_record_id', deployment.data.id.toString());

      - name: Mark deployment in progress
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_record_id }}'),
              state: 'in_progress',
              log_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              description: 'DEV deployment started'
            });

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy Bicep templates for dev
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail
            az account set --subscription "$AZURE_SUBSCRIPTION_ID"
            if [ -d "$BICEP_DIRECTORY" ]; then
              TEMPLATE_FILE=$(find "$BICEP_DIRECTORY" -maxdepth 1 -name "*.bicep" | head -n 1)
              PARAMETERS_FILE="$BICEP_DIRECTORY/parameters.json"
              if [ -n "$TEMPLATE_FILE" ]; then
                DEPLOY_ARGS=(deployment group create --resource-group "$AZURE_RESOURCE_GROUP" --template-file "$TEMPLATE_FILE")
                if [ -f "$PARAMETERS_FILE" ]; then
                  DEPLOY_ARGS+=(--parameters @"$PARAMETERS_FILE")
                fi
                az "${DEPLOY_ARGS[@]}"
              else
                echo "No Bicep template found under $BICEP_DIRECTORY."
              fi
            else
              echo "Expected directory $BICEP_DIRECTORY was not found in this sample repository."
            fi

      - name: Apply Kubernetes manifests to dev cluster
        run: |
          echo "Simulating kubectl apply for $AKS_CLUSTER_NAME"
          echo "# Example: kubectl apply -k infrastructure/environments/dev/k8s"
          echo "Dev manifests applied."

      - name: Run smoke tests
        run: |
          echo "Running simulated smoke tests against DEV endpoints..."
          sleep 5
          echo "Smoke tests passed."

      - name: Post deployment status
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_record_id }}'),
              state: 'success',
              log_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              environment_url: 'https://dev.example.internal',
              description: 'DEV deployment completed successfully'
            });

      - name: Mark deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            await github.rest.repos.createDeploymentStatus({
              owner,
              repo,
              deployment_id: Number('${{ steps.create_deployment.outputs.deployment_record_id }}'),
              state: 'failure',
              log_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              description: 'DEV deployment failed'
            });

  promote-to-staging:
    name: Trigger staging promotion
    needs: deploy
    if: ${{ success() && github.event_name == 'workflow_dispatch' }}
    uses: ./.github/workflows/promote-environment.yml
    permissions:
      contents: read
      deployments: read
      actions: write
      issues: write
      pull-requests: write
    with:
      source_environment: dev
      target_environment: staging
      commit_sha: ${{ github.sha }}
      deployment_id: ${{ needs.deploy.outputs.tracking_id }}
    secrets: inherit
