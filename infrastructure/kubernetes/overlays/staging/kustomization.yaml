apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base/namespace.yaml
  - ../../base/istio-config/gateway.yaml
  - ../../base/istio-config/virtual-services.yaml
  - ../../base/istio-config/destination-rules.yaml
  - ../../base/istio-config/authorization-policies.yaml
  - ../../base/argocd/project.yaml
  - ../../base/argocd/application.yaml
  - ../../base/network-policies/fast-policies.yaml

commonLabels:
  app.kubernetes.io/environment: staging

patches:
  - target:
      group: argoproj.io
      version: v1alpha1
      kind: Application
      name: fast
    patch: |-
      - op: replace
        path: /metadata/name
        value: fast-staging
      - op: replace
        path: /spec/source/path
        value: infrastructure/kubernetes/overlays/staging
