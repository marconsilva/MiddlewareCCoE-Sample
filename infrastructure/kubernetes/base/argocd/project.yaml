# SAMPLE/DEMO ArgoCD project for FAST runtime manifests.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: fast-platform
  namespace: argocd
spec:
  description: FAST integration runtime applications and service mesh resources.
  sourceRepos:
    - https://github.com/marconsilva/MiddlewareCCoE-Sample.git
  destinations:
    - namespace: fast
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
